<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://apis.google.com/js/api.js"></script>
  <link rel="stylesheet" href="calstyle.css" />
  <title>Derby Neck Library Calendar Project</title>
  <meta name="description"
    content="Developing an application to display a prettier calendar for the Derby Neck Library." />
</head>

<body>
  <h1 id="Header">Derby Neck Library Calendar Project</h1>
  <div class="container mt-5">
    <div class="layout">
      <div class="card">
        <h3 class="card-header" id="monthAndYear"></h3>
        <table class="table table-bordered table-responsive-sm" id="calendar">
          <thead>
            <tr>
              <th>Sunday</th>
              <th>Monday</th>
              <th>Tuesday</th>
              <th>Wednesday</th>
              <th>Thursday</th>
              <th>Friday</th>
              <th>Saturday</th>
            </tr>
          </thead>

          <tbody id="calendar-body">

          </tbody>
        </table>

        <div class="form-inline">

          <button class="btn btn-outline-primary col-sm-6" id="today"
            onclick="goToToday(); populateGoogleCal()">Today</button>

          <button class="btn btn-outline-primary col-sm-6" id="previous"
            onclick="previous(); populateGoogleCal();">Previous</button>

          <button class="btn btn-outline-primary col-sm-6" id="next" onclick="next(); populateGoogleCal()">Next</button>
        </div>
        <br />
        <form class="form-inline">
          <label class="lead mr-2 ml-2" for="month">Jump To: </label>
          <select class="form-control col-sm-4" name="month" id="month" onchange="jump(); populateGoogleCal()">
          </select>


          <label for="year"></label><select class="form-control col-sm-4" name="year" id="year"
            onchange="jump(); populateGoogleCal()">
            <option value=2024>2024</option>
            <option value=2025>2025</option>
            <option value=2026>2026</option>
            <option value=2027>2027</option>
            <option value=2028>2028</option>
            <option value=2029>2029</option>
            <option value=2030>2030</option>
          </select>
        </form>
      </div>

      <aside class="sidecol">
        <div class="card">
          <h4 class="card-header">Looking for something specific?</h4>
          <div class="p-3">
            <input type="text" id="myInput" onkeyup="searchCal()" placeholder="Search for events...">
            <p><strong>Event Demographics</strong></p>
            <p><label class="switch" id="babies-toggle"><input type="checkbox"><span
                  class="slider round"></span></label>&emsp;Babies & Littles</p>
            <p><label class="switch" id="kids-toggle"><input type="checkbox"><span
                  class="slider round"></span></label>&emsp;Kids</p>
            <p><label class="switch" id="tweens-toggle"><input type="checkbox"><span
                  class="slider round"></span></label>&emsp;Tweens</p>
            <p><label class="switch" id="teens-toggle"><input type="checkbox"><span
                  class="slider round"></span></label>&emsp;Teens</p>
            <p><label class="switch" id="intergen-toggle"><input type="checkbox"><span
                  class="slider round"></span></label>&emsp;Intergenerational</p>
            <p><small></small></p>
          </div>
        </div>
      </aside>
    </div>
  </div>
  <!--<button name="jump" onclick="jump()">Go</button>-->

  <script src="./components/populateCalendar.js"></script>

  </p>
  <div id="rR"></div>
  <script src="./components/calendarview.js"></script>
  <!-- month/year dropdown population moved into DOMContentLoaded handler above -->
</body>

</html>
